{% extends "base.html" %}
{% block content %}
    <div class="post-entry">
        <h2>{{ post.title }}</h2>
        <p>{{ post.author }}</p>
        <p>{{ post.body }}</p>
    </div>
    <a href="{{ post.get_edit_url }}">Edit Post</a>
    <a href="{{ post.get_delete_url }}">Delete Post</a>
{% endblock content %}
